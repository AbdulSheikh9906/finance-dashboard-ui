<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Finance Dashboard | Track Your Finances</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- React CDN -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        .transition-smooth {
            transition: all 0.2s ease-in-out;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.1);
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/javascript">
        // Complete Finance Dashboard Application
        (function() {
            // Wait for React to load
            if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
                console.error('React not loaded');
                document.getElementById('root').innerHTML = '<div class="p-8 text-center">Loading...</div>';
                return;
            }

            const { useState, useEffect, useRef } = React;

            // ---------- Mock Data ----------
            const MOCK_TRANSACTIONS = [
                { id: 1, date: '2024-03-15', amount: 3250.00, category: 'Salary', type: 'income', description: 'Monthly salary' },
                { id: 2, date: '2024-03-10', amount: 125.50, category: 'Groceries', type: 'expense', description: 'Supermarket shopping' },
                { id: 3, date: '2024-03-08', amount: 45.99, category: 'Dining', type: 'expense', description: 'Restaurant dinner' },
                { id: 4, date: '2024-03-05', amount: 89.99, category: 'Utilities', type: 'expense', description: 'Electricity bill' },
                { id: 5, date: '2024-03-03', amount: 15.99, category: 'Entertainment', type: 'expense', description: 'Netflix subscription' },
                { id: 6, date: '2024-02-28', amount: 250.00, category: 'Freelance', type: 'income', description: 'Project payment' },
                { id: 7, date: '2024-02-25', amount: 65.00, category: 'Transport', type: 'expense', description: 'Fuel' },
                { id: 8, date: '2024-02-20', amount: 320.00, category: 'Shopping', type: 'expense', description: 'New clothes' },
                { id: 9, date: '2024-02-18', amount: 55.00, category: 'Healthcare', type: 'expense', description: 'Pharmacy' },
                { id: 10, date: '2024-02-15', amount: 3250.00, category: 'Salary', type: 'income', description: 'Monthly salary' },
                { id: 11, date: '2024-02-10', amount: 95.00, category: 'Groceries', type: 'expense', description: 'Weekly groceries' },
                { id: 12, date: '2024-02-05', amount: 120.00, category: 'Dining', type: 'expense', description: 'Birthday dinner' }
            ];

            // Helper Functions
            function calculateSummary(transactions) {
                const totalIncome = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
                const totalExpense = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
                const totalBalance = totalIncome - totalExpense;
                return { totalBalance, totalIncome, totalExpense };
            }

            function getMonthlyData(transactions) {
                const monthlyMap = new Map();
                transactions.forEach(t => {
                    const month = t.date.substring(0, 7);
                    if (!monthlyMap.has(month)) {
                        monthlyMap.set(month, { income: 0, expense: 0 });
                    }
                    const data = monthlyMap.get(month);
                    if (t.type === 'income') data.income += t.amount;
                    else data.expense += t.amount;
                });
                return Array.from(monthlyMap.entries()).sort().map(([month, data]) => ({
                    month: new Date(month + '-01').toLocaleString('default', { month: 'short' }),
                    income: data.income,
                    expense: data.expense
                }));
            }

            function getCategorySpending(transactions) {
                const expenseCategories = transactions.filter(t => t.type === 'expense');
                const categoryMap = new Map();
                expenseCategories.forEach(t => {
                    categoryMap.set(t.category, (categoryMap.get(t.category) || 0) + t.amount);
                });
                return Array.from(categoryMap.entries()).map(([category, amount]) => ({ category, amount })).sort((a,b) => b.amount - a.amount);
            }

            function getInsights(transactions, categorySpending) {
                const highestCategory = categorySpending.length > 0 ? categorySpending[0] : null;
                const currentMonth = new Date().toISOString().substring(0, 7);
                const prevMonth = new Date(new Date().setMonth(new Date().getMonth() - 1)).toISOString().substring(0, 7);
                
                const currentMonthExpenses = transactions.filter(t => t.date.startsWith(currentMonth) && t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
                const prevMonthExpenses = transactions.filter(t => t.date.startsWith(prevMonth) && t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
                const expenseChange = prevMonthExpenses ? ((currentMonthExpenses - prevMonthExpenses) / prevMonthExpenses * 100).toFixed(1) : 0;
                
                const totalTransactions = transactions.length;
                const expenseTransactions = transactions.filter(t => t.type === 'expense');
                const avgExpense = expenseTransactions.length > 0 ? expenseTransactions.reduce((sum, t) => sum + t.amount, 0) / expenseTransactions.length : 0;
                
                return { highestCategory, expenseChange, totalTransactions, avgExpense, currentMonthExpenses, prevMonthExpenses };
            }

            // ---------- Zustand-like State Management (Simple Store) ----------
            class Store {
                constructor() {
                    this.state = {
                        transactions: [...MOCK_TRANSACTIONS],
                        role: 'viewer',
                        searchQuery: '',
                        typeFilter: 'all',
                        sortBy: 'date_desc',
                        editingTransaction: null,
                        showAddModal: false
                    };
                    this.listeners = [];
                }

                getState() {
                    return this.state;
                }

                setState(updater) {
                    const newState = typeof updater === 'function' ? updater(this.state) : updater;
                    this.state = { ...this.state, ...newState };
                    this.listeners.forEach(listener => listener(this.state));
                }

                subscribe(listener) {
                    this.listeners.push(listener);
                    return () => {
                        this.listeners = this.listeners.filter(l => l !== listener);
                    };
                }

                addTransaction(transaction) {
                    const newTransaction = {
                        ...transaction,
                        id: Date.now(),
                        date: transaction.date || new Date().toISOString().split('T')[0]
                    };
                    this.setState(state => ({
                        transactions: [newTransaction, ...state.transactions]
                    }));
                }

                updateTransaction(id, updatedData) {
                    this.setState(state => ({
                        transactions: state.transactions.map(t => t.id === id ? { ...t, ...updatedData } : t)
                    }));
                }

                deleteTransaction(id) {
                    if (confirm('Are you sure you want to delete this transaction?')) {
                        this.setState(state => ({
                            transactions: state.transactions.filter(t => t.id !== id)
                        }));
                    }
                }

                setRole(role) {
                    this.setState({ role });
                }

                setFilters(filters) {
                    this.setState(filters);
                }

                setShowAddModal(show) {
                    this.setState({ showAddModal: show, editingTransaction: null });
                }

                setEditingTransaction(transaction) {
                    this.setState({ editingTransaction: transaction, showAddModal: true });
                }
            }

            const store = new Store();

            // ---------- Chart Management ----------
            let trendChart = null;
            let categoryChart = null;

            function initCharts() {
                const trendCtx = document.getElementById('trendChart')?.getContext('2d');
                const categoryCtx = document.getElementById('categoryChart')?.getContext('2d');
                
                if (trendCtx) {
                    if (trendChart) trendChart.destroy();
                    trendChart = new Chart(trendCtx, {
                        type: 'line',
                        data: { labels: [], datasets: [] },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'top' } }
                        }
                    });
                }
                
                if (categoryCtx) {
                    if (categoryChart) categoryChart.destroy();
                    categoryChart = new Chart(categoryCtx, {
                        type: 'doughnut',
                        data: { labels: [], datasets: [] },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'bottom' } }
                        }
                    });
                }
            }

            function updateCharts(transactions) {
                const monthlyData = getMonthlyData(transactions);
                const categorySpending = getCategorySpending(transactions);
                
                if (trendChart) {
                    trendChart.data.labels = monthlyData.map(d => d.month);
                    trendChart.data.datasets = [
                        {
                            label: 'Income',
                            data: monthlyData.map(d => d.income),
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: 'Expenses',
                            data: monthlyData.map(d => d.expense),
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ];
                    trendChart.update();
                }
                
                if (categoryChart) {
                    categoryChart.data.labels = categorySpending.map(c => c.category);
                    categoryChart.data.datasets = [{
                        data: categorySpending.map(c => c.amount),
                        backgroundColor: ['#3b82f6', '#ef4444', '#f59e0b', '#10b981', '#8b5cf6', '#ec489a', '#06b6d4'],
                        borderWidth: 0
                    }];
                    categoryChart.update();
                }
            }

            // Summary Cards Component
            function SummaryCards({ transactions }) {
                const { totalBalance, totalIncome, totalExpense } = calculateSummary(transactions);
                return (
                    React.createElement('div', { className: "grid grid-cols-1 md:grid-cols-3 gap-4 mb-6" },
                        React.createElement('div', { className: "bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl p-5 text-white shadow-lg card-hover transition-smooth" },
                            React.createElement('div', { className: "flex justify-between items-start" },
                                React.createElement('div', null,
                                    React.createElement('p', { className: "text-blue-100 text-sm font-medium mb-1" }, "Total Balance"),
                                    React.createElement('p', { className: "text-3xl font-bold" }, `$${totalBalance.toLocaleString()}`)
                                ),
                                React.createElement('div', { className: "bg-white/20 rounded-lg p-2" },
                                    React.createElement('svg', { className: "w-6 h-6", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                                        React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" })
                                    )
                                )
                            )
                        ),
                        React.createElement('div', { className: "bg-white rounded-xl p-5 shadow-sm border border-gray-100 card-hover transition-smooth" },
                            React.createElement('div', { className: "flex justify-between items-start" },
                                React.createElement('div', null,
                                    React.createElement('p', { className: "text-gray-500 text-sm font-medium mb-1" }, "Total Income"),
                                    React.createElement('p', { className: "text-2xl font-bold text-green-600" }, `+$${totalIncome.toLocaleString()}`)
                                ),
                                React.createElement('div', { className: "bg-green-50 rounded-lg p-2" },
                                    React.createElement('svg', { className: "w-6 h-6 text-green-600", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                                        React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" })
                                    )
                                )
                            )
                        ),
                        React.createElement('div', { className: "bg-white rounded-xl p-5 shadow-sm border border-gray-100 card-hover transition-smooth" },
                            React.createElement('div', { className: "flex justify-between items-start" },
                                React.createElement('div', null,
                                    React.createElement('p', { className: "text-gray-500 text-sm font-medium mb-1" }, "Total Expenses"),
                                    React.createElement('p', { className: "text-2xl font-bold text-red-600" }, `-$${totalExpense.toLocaleString()}`)
                                ),
                                React.createElement('div', { className: "bg-red-50 rounded-lg p-2" },
                                    React.createElement('svg', { className: "w-6 h-6 text-red-600", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                                        React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M13 17h8m0 0V9m0 8l-8-8-4 4-6-6" })
                                    )
                                )
                            )
                        )
                    )
                );
            }

            // Charts Component
            function Charts({ transactions }) {
                useEffect(() => {
                    updateCharts(transactions);
                }, [transactions]);
                
                return (
                    React.createElement('div', { className: "grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6" },
                        React.createElement('div', { className: "bg-white rounded-xl p-5 shadow-sm border border-gray-100" },
                            React.createElement('h3', { className: "text-lg font-semibold text-gray-800 mb-3" }, "Balance Trend"),
                            React.createElement('div', { className: "h-64" },
                                React.createElement('canvas', { id: "trendChart" })
                            )
                        ),
                        React.createElement('div', { className: "bg-white rounded-xl p-5 shadow-sm border border-gray-100" },
                            React.createElement('h3', { className: "text-lg font-semibold text-gray-800 mb-3" }, "Spending Breakdown"),
                            React.createElement('div', { className: "h-64" },
                                React.createElement('canvas', { id: "categoryChart" })
                            )
                        )
                    )
                );
            }

            // Transaction Table Component
            function TransactionsList({ transactions, role, onEdit, onDelete }) {
                const [localSearch, setLocalSearch] = useState('');
                const [localTypeFilter, setLocalTypeFilter] = useState('all');
                const [localSortBy, setLocalSortBy] = useState('date_desc');
                
                const filteredAndSorted = React.useMemo(() => {
                    let filtered = [...transactions];
                    
                    if (localSearch) {
                        filtered = filtered.filter(t => 
                            t.description.toLowerCase().includes(localSearch.toLowerCase()) ||
                            t.category.toLowerCase().includes(localSearch.toLowerCase())
                        );
                    }
                    
                    if (localTypeFilter !== 'all') {
                        filtered = filtered.filter(t => t.type === localTypeFilter);
                    }
                    
                    filtered.sort((a, b) => {
                        switch(localSortBy) {
                            case 'date_desc': return new Date(b.date) - new Date(a.date);
                            case 'date_asc': return new Date(a.date) - new Date(b.date);
                            case 'amount_desc': return b.amount - a.amount;
                            case 'amount_asc': return a.amount - b.amount;
                            default: return 0;
                        }
                    });
                    
                    return filtered;
                }, [transactions, localSearch, localTypeFilter, localSortBy]);
                
                return (
                    React.createElement('div', { className: "bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden" },
                        React.createElement('div', { className: "p-5 border-b border-gray-100" },
                            React.createElement('div', { className: "flex flex-col sm:flex-row justify-between gap-4" },
                                React.createElement('h3', { className: "text-lg font-semibold text-gray-800" }, "Transactions"),
                                React.createElement('div', { className: "flex flex-wrap gap-3" },
                                    React.createElement('input', {
                                        type: "text",
                                        placeholder: "Search...",
                                        value: localSearch,
                                        onChange: (e) => setLocalSearch(e.target.value),
                                        className: "px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    }),
                                    React.createElement('select', {
                                        value: localTypeFilter,
                                        onChange: (e) => setLocalTypeFilter(e.target.value),
                                        className: "px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    },
                                        React.createElement('option', { value: "all" }, "All Types"),
                                        React.createElement('option', { value: "income" }, "Income"),
                                        React.createElement('option', { value: "expense" }, "Expense")
                                    ),
                                    React.createElement('select', {
                                        value: localSortBy,
                                        onChange: (e) => setLocalSortBy(e.target.value),
                                        className: "px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    },
                                        React.createElement('option', { value: "date_desc" }, "Latest First"),
                                        React.createElement('option', { value: "date_asc" }, "Oldest First"),
                                        React.createElement('option', { value: "amount_desc" }, "Highest Amount"),
                                        React.createElement('option', { value: "amount_asc" }, "Lowest Amount")
                                    )
                                )
                            )
                        ),
                        React.createElement('div', { className: "overflow-x-auto" },
                            React.createElement('table', { className: "w-full" },
                                React.createElement('thead', { className: "bg-gray-50" },
                                    React.createElement('tr', { className: "text-left text-sm font-medium text-gray-500" },
                                        React.createElement('th', { className: "px-5 py-3" }, "Date"),
                                        React.createElement('th', { className: "px-5 py-3" }, "Description"),
                                        React.createElement('th', { className: "px-5 py-3" }, "Category"),
                                        React.createElement('th', { className: "px-5 py-3" }, "Amount"),
                                        role === 'admin' && React.createElement('th', { className: "px-5 py-3" }, "Actions")
                                    )
                                ),
                                React.createElement('tbody', { className: "divide-y divide-gray-100" },
                                    filteredAndSorted.length === 0 ? 
                                        React.createElement('tr', null,
                                            React.createElement('td', { colSpan: role === 'admin' ? 5 : 4, className: "px-5 py-8 text-center text-gray-400" }, "No transactions found")
                                        ) :
                                        filteredAndSorted.map(t => 
                                            React.createElement('tr', { key: t.id, className: "hover:bg-gray-50 transition-smooth" },
                                                React.createElement('td', { className: "px-5 py-3 text-sm text-gray-600" }, new Date(t.date).toLocaleDateString()),
                                                React.createElement('td', { className: "px-5 py-3 text-sm font-medium text-gray-800" }, t.description),
                                                React.createElement('td', { className: "px-5 py-3" },
                                                    React.createElement('span', { className: "px-2 py-1 text-xs rounded-full bg-gray-100 text-gray-600" }, t.category)
                                                ),
                                                React.createElement('td', { className: `px-5 py-3 text-sm font-semibold ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}` },
                                                    `${t.type === 'income' ? '+' : '-'}$${t.amount.toLocaleString()}`
                                                ),
                                                role === 'admin' && React.createElement('td', { className: "px-5 py-3" },
                                                    React.createElement('button', { onClick: () => onEdit(t), className: "text-blue-600 hover:text-blue-800 mr-3 text-sm" }, "Edit"),
                                                    React.createElement('button', { onClick: () => onDelete(t.id), className: "text-red-600 hover:text-red-800 text-sm" }, "Delete")
                                                )
                                            )
                                        )
                                )
                            )
                        )
                    )
                );
            }

            // Insights Component
            function Insights({ transactions }) {
                const categorySpending = getCategorySpending(transactions);
                const insights = getInsights(transactions, categorySpending);
                
                return (
                    React.createElement('div', { className: "bg-white rounded-xl p-5 shadow-sm border border-gray-100 mb-6" },
                        React.createElement('h3', { className: "text-lg font-semibold text-gray-800 mb-4" }, "Financial Insights"),
                        React.createElement('div', { className: "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" },
                            React.createElement('div', { className: "p-4 bg-amber-50 rounded-lg" },
                                React.createElement('p', { className: "text-sm text-amber-700 mb-1" }, "🏆 Highest Spending"),
                                React.createElement('p', { className: "text-xl font-bold text-amber-800" }, insights.highestCategory ? `${insights.highestCategory.category} - $${insights.highestCategory.amount.toLocaleString()}` : 'No data')
                            ),
                            React.createElement('div', { className: "p-4 bg-blue-50 rounded-lg" },
                                React.createElement('p', { className: "text-sm text-blue-700 mb-1" }, "📊 Monthly Change"),
                                React.createElement('p', { className: "text-xl font-bold text-blue-800" }, `${insights.expenseChange > 0 ? '+' : ''}${insights.expenseChange}% vs last month`),
                                React.createElement('p', { className: "text-xs text-blue-600 mt-1" }, `Current: $${insights.currentMonthExpenses.toLocaleString()}`)
                            ),
                            React.createElement('div', { className: "p-4 bg-purple-50 rounded-lg" },
                                React.createElement('p', { className: "text-sm text-purple-700 mb-1" }, "💰 Avg. Expense"),
                                React.createElement('p', { className: "text-xl font-bold text-purple-800" }, `$${insights.avgExpense.toLocaleString(undefined, {maximumFractionDigits: 0})}`),
                                React.createElement('p', { className: "text-xs text-purple-600" }, "per transaction")
                            ),
                            React.createElement('div', { className: "p-4 bg-green-50 rounded-lg" },
                                React.createElement('p', { className: "text-sm text-green-700 mb-1" }, "📝 Total Transactions"),
                                React.createElement('p', { className: "text-xl font-bold text-green-800" }, insights.totalTransactions)
                            )
                        )
                    )
                );
            }

            // Add/Edit Modal
            function TransactionModal({ isOpen, onClose, onSave, editingTransaction }) {
                const [formData, setFormData] = useState({
                    description: '',
                    amount: '',
                    category: '',
                    type: 'expense',
                    date: new Date().toISOString().split('T')[0]
                });
                
                useEffect(() => {
                    if (editingTransaction) {
                        setFormData({
                            description: editingTransaction.description,
                            amount: editingTransaction.amount,
                            category: editingTransaction.category,
                            type: editingTransaction.type,
                            date: editingTransaction.date
                        });
                    } else {
                        setFormData({
                            description: '',
                            amount: '',
                            category: '',
                            type: 'expense',
                            date: new Date().toISOString().split('T')[0]
                        });
                    }
                }, [editingTransaction]);
                
                const handleSubmit = (e) => {
                    e.preventDefault();
                    if (!formData.description || !formData.amount || !formData.category) {
                        alert('Please fill all fields');
                        return;
                    }
                    onSave({
                        ...formData,
                        amount: parseFloat(formData.amount)
                    });
                    onClose();
                };
                
                if (!isOpen) return null;
                
                return (
                    React.createElement('div', { className: "fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 fade-in" },
                        React.createElement('div', { className: "bg-white rounded-xl p-6 w-full max-w-md mx-4" },
                            React.createElement('h3', { className: "text-xl font-bold mb-4" }, editingTransaction ? 'Edit Transaction' : 'Add Transaction'),
                            React.createElement('form', { onSubmit: handleSubmit },
                                React.createElement('input', {
                                    type: "text",
                                    placeholder: "Description",
                                    value: formData.description,
                                    onChange: (e) => setFormData({...formData, description: e.target.value}),
                                    className: "w-full mb-3 px-3 py-2 border rounded-lg",
                                    required: true
                                }),
                                React.createElement('input', {
                                    type: "number",
                                    placeholder: "Amount",
                                    value: formData.amount,
                                    onChange: (e) => setFormData({...formData, amount: e.target.value}),
                                    className: "w-full mb-3 px-3 py-2 border rounded-lg",
                                    required: true,
                                    step: "0.01"
                                }),
                                React.createElement('input', {
                                    type: "text",
                                    placeholder: "Category",
                                    value: formData.category,
                                    onChange: (e) => setFormData({...formData, category: e.target.value}),
                                    className: "w-full mb-3 px-3 py-2 border rounded-lg",
                                    required: true
                                }),
                                React.createElement('select', {
                                    value: formData.type,
                                    onChange: (e) => setFormData({...formData, type: e.target.value}),
                                    className: "w-full mb-3 px-3 py-2 border rounded-lg"
                                },
                                    React.createElement('option', { value: "expense" }, "Expense"),
                                    React.createElement('option', { value: "income" }, "Income")
                                ),
                                React.createElement('input', {
                                    type: "date",
                                    value: formData.date,
                                    onChange: (e) => setFormData({...formData, date: e.target.value}),
                                    className: "w-full mb-4 px-3 py-2 border rounded-lg"
                                }),
                                React.createElement('div', { className: "flex gap-3" },
                                    React.createElement('button', { type: "submit", className: "flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition" }, "Save"),
                                    React.createElement('button', { type: "button", onClick: onClose, className: "flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg hover:bg-gray-300 transition" }, "Cancel")
                                )
                            )
                        )
                    )
                );
            }

            // Main App Component
            function App() {
                const [state, setState] = useState(store.getState());
                const chartInitialized = useRef(false);
                
                useEffect(() => {
                    const unsubscribe = store.subscribe((newState) => {
                        setState({ ...newState });
                    });
                    return unsubscribe;
                }, []);
                
                useEffect(() => {
                    if (!chartInitialized.current) {
                        setTimeout(() => {
                            initCharts();
                            chartInitialized.current = true;
                            updateCharts(state.transactions);
                        }, 100);
                    } else {
                        updateCharts(state.transactions);
                    }
                }, [state.transactions]);
                
                const handleAddTransaction = (transaction) => {
                    store.addTransaction(transaction);
                };
                
                const handleEditTransaction = (transaction) => {
                    store.updateTransaction(transaction.id, transaction);
                };
                
                const handleDeleteTransaction = (id) => {
                    store.deleteTransaction(id);
                };
                
                return (
                    React.createElement('div', { className: "min-h-screen bg-gray-50" },
                        React.createElement('div', { className: "max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6" },
                            // Header
                            React.createElement('div', { className: "flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4" },
                                React.createElement('div', null,
                                    React.createElement('h1', { className: "text-3xl font-bold text-gray-800" }, "Finance Dashboard"),
                                    React.createElement('p', { className: "text-gray-500 mt-1" }, "Track your financial activity")
                                ),
                                React.createElement('div', { className: "flex gap-3 items-center" },
                                    React.createElement('div', { className: "flex items-center gap-2 bg-white rounded-lg px-3 py-2 shadow-sm" },
                                        React.createElement('span', { className: "text-sm text-gray-600" }, "Role:"),
                                        React.createElement('select', {
                                            value: state.role,
                                            onChange: (e) => store.setRole(e.target.value),
                                            className: "border-none bg-transparent font-medium focus:outline-none cursor-pointer"
                                        },
                                            React.createElement('option', { value: "viewer" }, "👁️ Viewer"),
                                            React.createElement('option', { value: "admin" }, "⚙️ Admin")
                                        )
                                    ),
                                    state.role === 'admin' && React.createElement('button', {
                                        onClick: () => store.setShowAddModal(true),
                                        className: "bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition shadow-sm flex items-center gap-2"
                                    },
                                        React.createElement('svg', { className: "w-5 h-5", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                                            React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M12 4v16m8-8H4" })
                                        ),
                                        "Add Transaction"
                                    )
                                )
                            ),
                            React.createElement(SummaryCards, { transactions: state.transactions }),
                            React.createElement(Charts, { transactions: state.transactions }),
                            React.createElement(Insights, { transactions: state.transactions }),
                            React.createElement(TransactionsList, {
                                transactions: state.transactions,
                                role: state.role,
                                onEdit: (t) => store.setEditingTransaction(t),
                                onDelete: handleDeleteTransaction
                            }),
                            React.createElement(TransactionModal, {
                                isOpen: state.showAddModal,
                                onClose: () => store.setShowAddModal(false),
                                onSave: (transaction) => {
                                    if (state.editingTransaction) {
                                        handleEditTransaction({ ...transaction, id: state.editingTransaction.id });
                                    } else {
                                        handleAddTransaction(transaction);
                                    }
                                    store.setShowAddModal(false);
                                },
                                editingTransaction: state.editingTransaction
                            })
                        )
                    )
                );
            }
            
            // Render App
            ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
        })();
    </script>
</body>
</html>
